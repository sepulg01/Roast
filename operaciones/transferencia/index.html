<!doctype html>
<html lang="es-CL">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Validar transferencia | Roast</title>
  <link rel="stylesheet" href="/assets/site.css" />
</head>
<body data-page="admin-transfer">
<header class="site-header">
  <div class="nav-shell">
    <a class="brand" href="/" aria-label="Roast inicio">Roast<span>.</span></a>
    <a class="checkout-nav-link" href="mailto:contacto@caferoast.cl">contacto@caferoast.cl</a>
  </div>
</header>

<main>
  <section class="section checkout-main">
    <div class="container">
      <article class="result-card" aria-live="polite">
        <p class="checkout-summary-kicker">Operación Roast</p>
        <h1 id="adminTransferTitle">Gestionar pedido</h1>
        <p class="muted" id="adminTransferCopy">Cargando pedido.</p>

        <section class="checkout-confirmation-section">
          <h2>Pedido</h2>
          <dl class="checkout-confirmation-list">
            <div><dt>Número</dt><dd id="adminOrderNumber">—</dd></div>
            <div><dt>Estado</dt><dd id="adminOrderStatus">—</dd></div>
            <div><dt>Total</dt><dd id="adminOrderTotal">—</dd></div>
            <div><dt>Productos</dt><dd id="adminOrderItems">—</dd></div>
          </dl>
        </section>

        <div class="checkout-step-actions admin-status-actions" aria-label="Acciones operativas del pedido">
          <button type="button" class="btn btn-primary" id="adminActionPaid" data-admin-status-action="paid">Marcar transferencia recibida</button>
          <button type="button" class="btn btn-secondary" id="adminActionExpired" data-admin-status-action="expired">Informar pedido expirado</button>
          <button type="button" class="btn btn-secondary" id="adminActionDelivering" data-admin-status-action="delivering">Informar pedido en despacho</button>
          <button type="button" class="btn btn-secondary" id="adminActionDelivered" data-admin-status-action="delivered">Informar pedido entregado</button>
        </div>
      </article>
    </div>
  </section>
</main>

<script>
  (function() {
    var params = new URLSearchParams(window.location.search);
    var orderId = params.get('order_id') || '';
    var token = params.get('token') || '';
    var actionParam = params.get('action') || '';
    var title = document.getElementById('adminTransferTitle');
    var copy = document.getElementById('adminTransferCopy');
    var number = document.getElementById('adminOrderNumber');
    var status = document.getElementById('adminOrderStatus');
    var total = document.getElementById('adminOrderTotal');
    var items = document.getElementById('adminOrderItems');
    var actionButtons = Array.prototype.slice.call(document.querySelectorAll('[data-admin-status-action]'));
    var currentStatus = '';
    var formatter = new Intl.NumberFormat('es-CL', {
      style: 'currency',
      currency: 'CLP',
      maximumFractionDigits: 0
    });
    var actionConfig = {
      paid: {
        loading: 'Marcando transferencia como recibida.',
        success: 'Pedido marcado como pagado.',
        already: 'Este pedido ya está marcado como pagado.',
        allowedFrom: ['pending_transfer']
      },
      expired: {
        loading: 'Marcando pedido como expirado.',
        success: 'Pedido marcado como expirado.',
        already: 'Este pedido ya está marcado como vencido.',
        allowedFrom: ['pending_transfer']
      },
      delivering: {
        loading: 'Marcando pedido en despacho.',
        success: 'Pedido marcado en despacho.',
        already: 'Este pedido ya está en despacho.',
        allowedFrom: ['paid']
      },
      delivered: {
        loading: 'Marcando pedido como entregado.',
        success: 'Pedido marcado como entregado.',
        already: 'Este pedido ya está marcado como entregado.',
        allowedFrom: ['delivering']
      }
    };
    var statusLabels = {
      pending_transfer: 'esperando transferencia',
      paid: 'pagado',
      expired: 'expirado',
      delivering: 'en despacho',
      delivered: 'entregado'
    };

    function normalizeAction(value) {
      var normalized = String(value || '').trim().toLowerCase();
      return actionConfig && actionConfig[normalized] ? normalized : 'paid';
    }

    function setMessage(message) {
      if (copy) copy.textContent = message;
    }

    function getActionToken(action) {
      return params.get(action + '_token') || (action === normalizeAction(actionParam) ? token : '');
    }

    function setAllDisabled(disabled) {
      actionButtons.forEach(function(button) {
        button.disabled = disabled;
      });
    }

    function canRunAction(action, statusValue) {
      var config = actionConfig[action] || actionConfig.paid;
      return config.allowedFrom.indexOf(statusValue) !== -1;
    }

    function syncActions() {
      var enabledCount = 0;

      actionButtons.forEach(function(button) {
        var action = normalizeAction(button.getAttribute('data-admin-status-action'));
        var hasToken = Boolean(getActionToken(action));
        var enabled = hasToken && canRunAction(action, currentStatus);
        button.disabled = !enabled;
        button.setAttribute('aria-disabled', String(!enabled));
        if (enabled) enabledCount += 1;
      });

      if (currentStatus === 'delivered' || currentStatus === 'expired') {
        setMessage('Pedido en estado final: ' + (statusLabels[currentStatus] || currentStatus) + '.');
        return;
      }

      if (!enabledCount) {
        setMessage('No hay acciones disponibles para pedidos en estado ' + (statusLabels[currentStatus] || currentStatus || 'desconocido') + '.');
        return;
      }

      setMessage('Revisa el estado real del pedido antes de ejecutar una acción.');
    }

    async function fetchJson(url, options) {
      var response = await fetch(url, options || {});
      var payload = await response.json().catch(function() { return {}; });

      if (!response.ok || payload.ok === false) {
        throw new Error(payload.error || 'No se pudo completar la operación.');
      }

      return payload;
    }

    async function loadOrder() {
      if (title) title.textContent = 'Gestionar pedido';

      if (!orderId) {
        setAllDisabled(true);
        setMessage('Falta información para ejecutar esta acción.');
        return;
      }

      var payload = await fetchJson('/api/orders/' + encodeURIComponent(orderId));
      if (number) number.textContent = payload.confirmation_number || payload.order_number || payload.order_id;
      if (status) status.textContent = payload.internal_status || 'Sin estado';
      if (total) total.textContent = formatter.format(Number(payload.total_clp || 0));
      if (items) items.textContent = payload.items_label || 'Sin detalle';
      currentStatus = payload.internal_status || '';
      syncActions();
    }

    async function runAction(action, button) {
      var config = actionConfig[action] || actionConfig.paid;
      var actionToken = getActionToken(action);

      if (!actionToken || !canRunAction(action, currentStatus)) return;

      setAllDisabled(true);
      setMessage(config.loading);

      try {
        var endpoint = '/api/admin/orders/' + encodeURIComponent(orderId) + '/status';
        var payload = await fetchJson(endpoint, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ token: actionToken, status: action })
        });
        currentStatus = payload.internal_status || action;
        if (status) status.textContent = currentStatus;
        syncActions();
        setMessage(payload.already_status || payload.already_paid ? config.already : config.success);
      } catch (error) {
        syncActions();
        setMessage(error.message || 'No se pudo completar la acción.');
      }
    }

    actionButtons.forEach(function(button) {
      button.addEventListener('click', function() {
        runAction(normalizeAction(button.getAttribute('data-admin-status-action')), button);
      });
    });

    loadOrder().catch(function(error) {
      setAllDisabled(true);
      setMessage(error.message || 'No se pudo cargar el pedido.');
    });
  }());
</script>
</body>
</html>
