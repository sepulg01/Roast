<!doctype html>
<html lang="es-CL">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Validar transferencia | Roast</title>
  <link rel="stylesheet" href="/assets/site.css" />
</head>
<body data-page="admin-transfer">
<header class="site-header">
  <div class="nav-shell">
    <a class="brand" href="/" aria-label="Roast inicio">Roast<span>.</span></a>
    <a class="checkout-nav-link" href="mailto:contacto@caferoast.cl">contacto@caferoast.cl</a>
  </div>
</header>

<main>
  <section class="section checkout-main">
    <div class="container">
      <article class="result-card" aria-live="polite">
        <p class="checkout-summary-kicker">Operación Roast</p>
        <h1 id="adminTransferTitle">Validar transferencia</h1>
        <p class="muted" id="adminTransferCopy">Cargando pedido.</p>

        <section class="checkout-confirmation-section">
          <h2>Pedido</h2>
          <dl class="checkout-confirmation-list">
            <div><dt>Número</dt><dd id="adminOrderNumber">—</dd></div>
            <div><dt>Estado</dt><dd id="adminOrderStatus">—</dd></div>
            <div><dt>Total</dt><dd id="adminOrderTotal">—</dd></div>
            <div><dt>Productos</dt><dd id="adminOrderItems">—</dd></div>
          </dl>
        </section>

        <div class="checkout-step-actions">
          <button type="button" class="btn btn-primary" id="adminConfirmTransferButton">Marcar transferencia recibida</button>
        </div>
      </article>
    </div>
  </section>
</main>

<script>
  (function() {
    var params = new URLSearchParams(window.location.search);
    var orderId = params.get('order_id') || '';
    var token = params.get('token') || '';
    var actionParam = params.get('action') || '';
    var action = 'paid';
    var isLegacyConfirmLink = !actionParam;
    var title = document.getElementById('adminTransferTitle');
    var copy = document.getElementById('adminTransferCopy');
    var button = document.getElementById('adminConfirmTransferButton');
    var number = document.getElementById('adminOrderNumber');
    var status = document.getElementById('adminOrderStatus');
    var total = document.getElementById('adminOrderTotal');
    var items = document.getElementById('adminOrderItems');
    var formatter = new Intl.NumberFormat('es-CL', {
      style: 'currency',
      currency: 'CLP',
      maximumFractionDigits: 0
    });
    var actionConfig = {
      paid: {
        title: 'Validar transferencia',
        button: 'Marcar transferencia recibida',
        loading: 'Marcando transferencia como recibida.',
        successTitle: 'Transferencia validada',
        success: 'Pedido marcado como pagado.',
        already: 'Este pedido ya está marcado como pagado.',
        allowedFrom: ['pending_transfer']
      },
      expired: {
        title: 'Marcar pedido vencido',
        button: 'Marcar pedido vencido',
        loading: 'Marcando pedido como vencido.',
        successTitle: 'Pedido vencido',
        success: 'Pedido marcado como vencido.',
        already: 'Este pedido ya está marcado como vencido.',
        allowedFrom: ['pending_transfer']
      },
      delivering: {
        title: 'Marcar pedido en despacho',
        button: 'Marcar en despacho',
        loading: 'Marcando pedido en despacho.',
        successTitle: 'Pedido en despacho',
        success: 'Pedido marcado en despacho.',
        already: 'Este pedido ya está en despacho.',
        allowedFrom: ['paid']
      }
    };
    action = normalizeAction(actionParam || 'paid');

    function normalizeAction(value) {
      var normalized = String(value || '').trim().toLowerCase();
      return actionConfig && actionConfig[normalized] ? normalized : 'paid';
    }

    function setMessage(message) {
      if (copy) copy.textContent = message;
    }

    function setDisabled(disabled) {
      if (button) button.disabled = disabled;
    }

    function getActionConfig() {
      return actionConfig[action] || actionConfig.paid;
    }

    function syncActionCopy() {
      var config = getActionConfig();

      if (title) title.textContent = config.title;
      if (button) button.textContent = config.button;
    }

    function canRunAction(currentStatus) {
      var config = getActionConfig();
      return config.allowedFrom.indexOf(currentStatus) !== -1;
    }

    async function fetchJson(url, options) {
      var response = await fetch(url, options || {});
      var payload = await response.json().catch(function() { return {}; });

      if (!response.ok || payload.ok === false) {
        throw new Error(payload.error || 'No se pudo completar la operación.');
      }

      return payload;
    }

    async function loadOrder() {
      syncActionCopy();

      if (!orderId || !token) {
        setDisabled(true);
        setMessage('Falta información para ejecutar esta acción.');
        return;
      }

      var payload = await fetchJson('/api/orders/' + encodeURIComponent(orderId));
      if (number) number.textContent = payload.confirmation_number || payload.order_number || payload.order_id;
      if (status) status.textContent = payload.internal_status || 'Sin estado';
      if (total) total.textContent = formatter.format(Number(payload.total_clp || 0));
      if (items) items.textContent = payload.items_label || 'Sin detalle';
      var currentStatus = payload.internal_status || '';
      var config = getActionConfig();

      if (currentStatus === action) {
        setMessage(config.already);
        setDisabled(true);
        return;
      }

      if (!canRunAction(currentStatus)) {
        setMessage('Esta acción no está disponible para pedidos en estado ' + (currentStatus || 'desconocido') + '.');
        setDisabled(true);
        return;
      }

      setMessage(action === 'paid' ? 'Revisa el banco antes de marcar este pedido como pagado.' : 'Revisa el pedido antes de ejecutar esta acción.');
      setDisabled(false);
    }

    async function runAction() {
      var config = getActionConfig();
      setDisabled(true);
      setMessage(config.loading);

      try {
        var endpoint = isLegacyConfirmLink
          ? '/api/admin/orders/' + encodeURIComponent(orderId) + '/confirm-transfer'
          : '/api/admin/orders/' + encodeURIComponent(orderId) + '/status';
        var body = isLegacyConfirmLink ? { token: token } : { token: token, status: action };
        var payload = await fetchJson(endpoint, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(body)
        });
        if (status) status.textContent = payload.internal_status || action;
        if (title) title.textContent = config.successTitle;
        setMessage(payload.already_status || payload.already_paid ? config.already : config.success);
      } catch (error) {
        setDisabled(false);
        setMessage(error.message || 'No se pudo completar la acción.');
      }
    }

    if (button) {
      button.addEventListener('click', runAction);
    }

    loadOrder().catch(function(error) {
      setDisabled(true);
      setMessage(error.message || 'No se pudo cargar el pedido.');
    });
  }());
</script>
</body>
</html>
