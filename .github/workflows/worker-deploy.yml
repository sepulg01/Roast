name: Deploy Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: worker-deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Test, deploy, and smoke
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
      PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM: ${{ secrets.RESEND_FROM }}
      RESEND_REPLY_TO: ${{ secrets.RESEND_REPLY_TO }}
      ADMIN_ACTION_SECRET: ${{ secrets.ADMIN_ACTION_SECRET }}
      WHATSAPP_CLOUD_TOKEN: ${{ secrets.WHATSAPP_CLOUD_TOKEN }}
      WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
      WHATSAPP_NOTIFY_TO: ${{ secrets.WHATSAPP_NOTIFY_TO }}
      WHATSAPP_TEMPLATE_ORDER_EVENT: ${{ secrets.WHATSAPP_TEMPLATE_ORDER_EVENT }}
      WHATSAPP_TEMPLATE_PAID_EVENT: ${{ secrets.WHATSAPP_TEMPLATE_PAID_EVENT }}
      WHATSAPP_TEMPLATE_LANGUAGE: ${{ secrets.WHATSAPP_TEMPLATE_LANGUAGE }}
      APPS_SCRIPT_WEBHOOK_URL: ${{ secrets.APPS_SCRIPT_WEBHOOK_URL }}
      APPS_SCRIPT_SHARED_SECRET: ${{ secrets.APPS_SCRIPT_SHARED_SECRET }}
      FLOW_API_KEY: ${{ secrets.FLOW_API_KEY }}
      FLOW_SECRET_KEY: ${{ secrets.FLOW_SECRET_KEY }}
      FLOW_BASE_URL: ${{ secrets.FLOW_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install site dependencies
        run: npm ci

      - name: Install worker dependencies
        run: npm --prefix worker ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Static checks
        run: npm run test:static

      - name: Functional tests
        run: npm run test:functional -- --reporter=line

      - name: Sync Worker secrets
        shell: bash
        run: |
          set -euo pipefail
          cd worker

          put_required_secret() {
            local name="$1"
            local value="${!name:-}"
            if [ -z "$value" ]; then
              echo "::error title=Missing required production secret::$name is empty or not configured."
              exit 1
            fi
            printf '%s' "$value" | npm exec -- wrangler secret put "$name"
          }

          put_optional_secret() {
            local name="$1"
            local value="${!name:-}"
            if [ -z "$value" ]; then
              echo "Skipping optional $name because it is empty."
              return 0
            fi
            printf '%s' "$value" | npm exec -- wrangler secret put "$name"
          }

          put_required_secret GOOGLE_SERVICE_ACCOUNT_JSON
          put_required_secret GOOGLE_SHEET_ID
          put_required_secret GOOGLE_MAPS_API_KEY
          put_required_secret PUBLIC_BASE_URL
          put_required_secret RESEND_API_KEY
          put_required_secret RESEND_FROM
          put_required_secret RESEND_REPLY_TO

          put_optional_secret APPS_SCRIPT_WEBHOOK_URL
          put_optional_secret APPS_SCRIPT_SHARED_SECRET
          put_optional_secret ADMIN_ACTION_SECRET
          put_optional_secret WHATSAPP_CLOUD_TOKEN
          put_optional_secret WHATSAPP_PHONE_NUMBER_ID
          put_optional_secret WHATSAPP_NOTIFY_TO
          put_optional_secret WHATSAPP_TEMPLATE_ORDER_EVENT
          put_optional_secret WHATSAPP_TEMPLATE_PAID_EVENT
          put_optional_secret WHATSAPP_TEMPLATE_LANGUAGE
          put_optional_secret FLOW_API_KEY
          put_optional_secret FLOW_SECRET_KEY
          put_optional_secret FLOW_BASE_URL

      - name: Deploy Cloudflare Worker
        run: npm --prefix worker run deploy

      - name: Production smoke test
        run: npm run smoke:worker-production -- --base-url https://caferoast.cl
