name: Deploy Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: worker-deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Test, deploy, and smoke
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install site dependencies
        run: npm ci

      - name: Install worker dependencies
        run: npm --prefix worker ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Static checks
        run: npm run test:static

      - name: Functional tests
        run: npm run test:functional -- --reporter=line

      - name: Deploy Cloudflare Worker
        run: npm --prefix worker run deploy

      - name: Production smoke test
        run: npm run smoke:worker-production -- --base-url https://caferoast.cl
