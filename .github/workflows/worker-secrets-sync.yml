name: Sync Worker Secrets

on:
  workflow_dispatch:

concurrency:
  group: worker-secrets-sync-production
  cancel-in-progress: false

jobs:
  sync:
    name: Sync production secrets to Cloudflare
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
      APPS_SCRIPT_WEBHOOK_URL: ${{ secrets.APPS_SCRIPT_WEBHOOK_URL }}
      APPS_SCRIPT_SHARED_SECRET: ${{ secrets.APPS_SCRIPT_SHARED_SECRET }}
      PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM: ${{ secrets.RESEND_FROM }}
      RESEND_REPLY_TO: ${{ secrets.RESEND_REPLY_TO }}
      FLOW_API_KEY: ${{ secrets.FLOW_API_KEY }}
      FLOW_SECRET_KEY: ${{ secrets.FLOW_SECRET_KEY }}
      FLOW_BASE_URL: ${{ secrets.FLOW_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install worker dependencies
        run: npm --prefix worker ci

      - name: Sync required Worker secrets
        shell: bash
        run: |
          set -euo pipefail
          cd worker

          put_required_secret() {
            local name="$1"
            local value="${!name:-}"
            if [ -z "$value" ]; then
              echo "::error title=Missing required production secret::$name is empty or not configured."
              exit 1
            fi
            printf '%s' "$value" | npm exec -- wrangler secret put "$name"
          }

          put_required_secret GOOGLE_SERVICE_ACCOUNT_JSON
          put_required_secret GOOGLE_SHEET_ID
          put_required_secret GOOGLE_MAPS_API_KEY
          put_required_secret PUBLIC_BASE_URL
          put_required_secret RESEND_API_KEY
          put_required_secret RESEND_FROM
          put_required_secret RESEND_REPLY_TO

      - name: Sync optional legacy Worker secrets
        shell: bash
        run: |
          set -euo pipefail
          cd worker

          put_optional_secret() {
            local name="$1"
            local value="${!name:-}"
            if [ -z "$value" ]; then
              echo "Skipping optional $name because it is empty."
              return 0
            fi
            printf '%s' "$value" | npm exec -- wrangler secret put "$name"
          }

          put_optional_secret APPS_SCRIPT_WEBHOOK_URL
          put_optional_secret APPS_SCRIPT_SHARED_SECRET
          put_optional_secret FLOW_API_KEY
          put_optional_secret FLOW_SECRET_KEY
          put_optional_secret FLOW_BASE_URL
